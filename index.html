<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analyzer</title>
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1d4ed8;
            --card: rgba(255, 255, 255, 0.08);
            --card2: rgba(255, 255, 255, 0.12);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.72);
            --accent: #60a5fa;
            --accent2: #34d399;
            --danger: #fb7185;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --ring: 0 0 0 4px rgba(96, 165, 250, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
                "Segoe UI Emoji";
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 10% 10%, rgba(141, 19, 131, 0.35), transparent 55%),
                radial-gradient(900px 500px at 90% 30%, rgba(16, 58, 42, 0.25), transparent 60%),
                linear-gradient(135deg, var(--bg1), #4d6ec4 55%, #0c2a58);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .wrap {
            width: min(920px, 100%);
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .title {
            font-size: clamp(22px, 3.2vw, 30px);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0;
        }
        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .card {
            background: linear-gradient(180deg, var(--card), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: var(--shadow);
            border-radius: 18px;
            overflow: hidden;
        }

        .card-inner {
            padding: 18px;
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"] {
            flex: 1 1 320px;
            min-width: 220px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(15, 23, 42, 0.55);
            color: var(--text);
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.55);
        }

        input[type="text"]:focus {
            border-color: rgba(96, 165, 250, 0.65);
            box-shadow: var(--ring);
            transform: translateY(-1px);
        }

        button {
            padding: 12px 16px;
            border: 0;
            border-radius: 12px;
            background: rgb(92, 199, 248);
            color: #06213f;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.28);
            transition: transform 160ms ease, filter 160ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        button:active {
            transform: translateY(0);
        }

        .hint {
            margin-top: 10px;
            color: var(--muted);
            font-size: 12.5px;
            line-height: 1.4;
        }

        #result {
            margin-top: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .stat {
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat .k {
            display: block;
            color: var(--muted);
            font-size: 12.5px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .stat .v {
            font-size: 18px;
            font-weight: 900;
        }

        .footer-note {
            color: rgba(255, 255, 255, 0.55);
            font-size: 12px;
            margin-top: 10px;
        }

        .error {
            color: #ffd5db;
            background: rgba(251, 113, 133, 0.12);
            border: 1px solid rgba(251, 113, 133, 0.35);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <div>
                <h1 class="title">Sales Analyzer</h1>
                <p class="subtitle">Enter daily sales (comma-separated) to compute totals and insights.</p>
            </div>
        </header>

        <section class="card">
            <div class="card-inner">
                <div class="row">
                    <label for="s">Daily Sales</label>
                    <input type="text" id="s" placeholder="e.g. 1200, 800, 1500, 400">
                    <button type="button" onclick="analyze()">Submit</button>
                </div>

                <div class="hint">Example: <b>100, 1200, 900, 1600</b>. Use commas to separate each day.</div>

                <div id="result" aria-live="polite">
                    <div class="footer-note">Press <b>Submit</b> to see results.</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function analyze() {
            const inputEl = document.getElementById("s");
            const resultEl = document.getElementById("result");
            const s_in = (inputEl.value || "").trim();
            if (!s_in) {
                resultEl.classList.add('error');
                resultEl.innerHTML = `<div class="footer-note">Please enter sales values.</div>`;
                return;
            }

            // Parse as numbers, trimming spaces around commas.
            const sales = s_in.split(",").map(x => x.trim()).filter(Boolean).map(Number);

            if (sales.length === 0 || sales.some(n => Number.isNaN(n))) {
                resultEl.classList.add('error');
                resultEl.innerHTML = `<div class="footer-note">Invalid input. Use comma-separated numbers only.</div>`;
                return;
            }

            // Original logic, adapted to numeric types.
            let total = 0;
            let highest = sales[0];
            let highest_day = 1;
            let lowest = sales[0];
